<!DOCTYPE html>
<html>
<head>
  <title>Quiet Genius</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #05060a);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 10px;
      animation: fadeIn 1.2s ease-in-out;
    }

    .line {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 20px auto;
    }

    .tag {
      font-size: 14px;
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .bio {
      font-size: 16px;
      opacity: 0.75;
      line-height: 1.8;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Quiet Genius</h1>

  <div class="line"></div>

  <div class="tag">he / him</div>

  <div class="bio">
    calm presence.<br>
    observant mind.<br>
    speaks less, notices more.<br><br>

    not trying to be seen.<br>
    just naturally noticed.
  </div>

  <div class="footer">
    minimal identity • digital presence
  </div>

</div>

</body>
</html>
