<!DOCTYPE html>
<html>
<head>
  <title>Quiet Genius</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #05060a);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 10px;
      animation: fadeIn 1.2s ease-in-out;
    }

    .line {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 20px auto;
    }

    .tag {
      font-size: 14px;
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .bio {
      font-size: 16px;
      opacity: 0.75;
      line-height: 1.8;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Quiet Genius</h1>

  <div class="line"></div>

  <div class="tag">he / him</div>

  <div class="bio">
    calm presence.<br>
    observant mind.<br>
    quiet things mean the most.<br><br>

    not trying to be seen.<br>
    just naturally noticed.
  </div>

  <div class="footer">
    minimal identity • digital presence
  </div>

</div>

</body>
</html>
<div style="margin-top: 50px; text-align: center; opacity: 0.9;">

  <div style="width: 60px; height: 1px; background: rgba(255,255,255,0.3); margin: 30px auto;"></div>

  <p style="font-size: 12px; letter-spacing: 2px; opacity: 0.5;">
    QUIET ANALYSIS
  </p>

  <button onclick="revealPersonality()" 
    style="margin:10px; padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.08); color: white;">
    understand me
  </button>

  <button onclick="revealHowToTalk()" 
    style="margin:10px; padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.05); color: white;">
    how to talk to me
  </button>

  <p id="personalityText" style="margin-top: 20px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.7; opacity: 0;"></p>

</div>

<script>
function revealPersonality() {
  const text = `
take your time, i’m not going anywhere

quiet thoughts.
soft presence.
a mind that notices more than it says.
i understand more than i show

nothing to prove here.
just a calm kind of understanding.
  `;

  const el = document.getElementById("personalityText");
  el.innerText = text;
  el.style.opacity = 0.85;
}

function revealHowToTalk() {
  const text = `
no need to figure me out.
just speak naturally.

you don’t have to say much
i get it anyway
we’re good here
  `;

  const el = document.getElementById("personalityText");
  el.innerText = text;
  el.style.opacity = 0.85;
}
</script>
<div onclick="toggleSpecial()" 
     style="
     position: fixed;
     left: 20px;
     bottom: 80px;
     background: rgba(255,255,255,0.06);
     padding: 12px 16px;
     border-radius: 20px;
     cursor: pointer;
     font-size: 12px;
     letter-spacing: 1px;
     opacity: 0.8;
     backdrop-filter: blur(10px);
     ">
  if you're special, click
</div>

<div id="specialText" 
     style="
     position: fixed;
     left: 20px;
     bottom: 140px;
     max-width: 220px;
     font-size: 13px;
     line-height: 1.6;
     opacity: 0;
     transition: 0.4s;
     color: white;
     ">
</div>

<script>
let specialOpen = false;

function toggleSpecial() {
  const el = document.getElementById("specialText");

  if (!specialOpen) {
    el.innerText = "lies are sacrifices — sacrifices are worth?--don't overthing it, you’re not the only one who felt that";
    el.style.opacity = 0.85;
    specialOpen = true;
  } else {
    el.style.opacity = 0;
    specialOpen = false;
  }
}
</script>
