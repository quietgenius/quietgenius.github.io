<!DOCTYPE html>
<html>
<head>
  <title>Quiet Genius</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
      padding: 60px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 16px;
      margin-bottom: 40px;
    }

    .line {
      width: 60px;
      height: 2px;
      background: white;
      margin: 20px auto;
      opacity: 0.3;
    }

    .text {
      max-width: 500px;
      margin: auto;
      opacity: 0.8;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<h1>Quiet Genius</h1>

<div class="line"></div>

<p>he/him</p>

<div class="text">
  calm presence.<br>
  observant mind.<br>
  speaks less, understands more.<br><br>

  nothing to prove.<br>
  just here.
</div>

</body>
</html>
